<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O.S BambuLab – Manutenção e Garantia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f0f0;
      color: #111;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: #1FA852;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 26px; height: 26px; fill: #fff; }
    .header-text h1 { font-size: 18px; font-weight: 700; letter-spacing: .3px; }
    .header-text p  { font-size: 12px; color: #aaa; margin-top: 1px; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      min-height: calc(100vh - 64px);
    }

    /* ── SIDEBAR ── */
    aside {
      width: 290px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #ddd;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .sidebar-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #1FA852;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .sidebar-search {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      color: #555;
      outline: none;
    }
    .sidebar-search:focus { border-color: #1FA852; }
    .btn-nova-os {
      width: 100%;
      padding: 10px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-nova-os:hover { background: #333; }
    .os-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .os-item {
      padding: 10px 12px;
      border: 1px solid #eee;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color .15s, background .15s;
    }
    .os-item:hover { border-color: #1FA852; background: #f0faf4; }
    .os-item-name { font-weight: 600; }
    .os-item-sub  { font-size: 11px; color: #888; margin-top: 2px; }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 28px 32px;
      max-width: 900px;
    }

    /* ── SECTION CARD ── */
    .card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .card-header {
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
    }
    .card-header .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #1FA852;
      flex-shrink: 0;
    }
    .card-header h2 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .card-body { padding: 20px 18px; }

    /* ── FORM ── */
    .row { display: flex; gap: 14px; margin-bottom: 14px; }
    .row:last-child { margin-bottom: 0; }
    .field { display: flex; flex-direction: column; gap: 5px; flex: 1; }
    .field label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555;
    }
    .field input,
    .field textarea,
    .field select {
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      color: #111;
      background: #fff;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    .field input:focus,
    .field textarea:focus { border-color: #1FA852; }
    .field textarea { resize: vertical; min-height: 90px; }
    .field input::placeholder,
    .field textarea::placeholder { color: #bbb; }

    /* ── MODELO BUTTONS ── */
    .modelo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 4px;
    }
    .btn-modelo {
      padding: 12px 6px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }
    .btn-modelo:hover  { border-color: #1FA852; color: #1FA852; }
    .btn-modelo.active { border-color: #1FA852; background: #1FA852; color: #fff; }

    /* ── CHECKBOXES ── */
    .checks-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin-bottom: 14px;
    }
    .check-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      cursor: pointer;
    }
    .check-label input[type=checkbox] {
      width: 16px; height: 16px;
      accent-color: #1FA852;
      cursor: pointer;
    }

    /* ── ESTADO BUTTONS ── */
    .estado-row { display: flex; gap: 10px; }
    .btn-estado {
      padding: 10px 18px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-estado.bom:hover  { border-color: #22c55e; color: #22c55e; }
    .btn-estado.bom.active { border-color: #22c55e; background: #22c55e; color: #fff; }
    .btn-estado.dan:hover  { border-color: #1FA852; color: #1FA852; }
    .btn-estado.dan.active { border-color: #1FA852; background: #1FA852; color: #fff; }

    /* ── DATAS CARD ── */
    .card-datas .card-body {
      background: #1FA852;
    }
    .card-datas .field label { color: rgba(255,255,255,.75); }
    .card-datas .field input {
      background: rgba(255,255,255,.15);
      border-color: rgba(255,255,255,.3);
      color: #fff;
    }
    .card-datas .field input::-webkit-calendar-picker-indicator { filter: invert(1); }
    .card-datas .field input::placeholder { color: rgba(255,255,255,.5); }
    .card-datas .field input:focus { border-color: #fff; }

    /* ── ACTIONS ── */
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
      padding-bottom: 40px;
    }
    .btn-limpar {
      padding: 11px 22px;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-limpar:hover { border-color: #999; }
    .btn-salvar {
      padding: 11px 22px;
      border: none;
      border-radius: 6px;
      background: #1FA852;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .15s;
    }
    .btn-salvar:hover { background: #178a44; }
    .btn-salvar svg { width: 16px; height: 16px; fill: #fff; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #111;
      color: #fff;
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: all .3s ease;
      z-index: 999;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast .check { color: #22c55e; }

    /* ── DIVIDER ── */
    .divider { border: none; border-top: 1px solid #eee; margin: 14px 0; }

    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      aside { width: 100%; border-right: none; border-bottom: 1px solid #ddd; }
      main { padding: 18px 14px; }
      .modelo-grid { grid-template-columns: repeat(3, 1fr); }
      .row { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
      <!-- tronco esquerdo -->
      <line x1="8" y1="2" x2="8" y2="22"/>
      <line x1="6" y1="7" x2="10" y2="7"/>
      <line x1="6" y1="14" x2="10" y2="14"/>
      <!-- tronco direito -->
      <line x1="16" y1="4" x2="16" y2="22"/>
      <line x1="14" y1="10" x2="18" y2="10"/>
      <line x1="14" y1="17" x2="18" y2="17"/>
      <!-- galho -->
      <path d="M8 7 Q12 5 16 4"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Ordem de Serviços</h1>
    <p>Manutenção e Garantia · BambuLab</p>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside>
    <div class="sidebar-title">Histórico de Ordens</div>
    <input class="sidebar-search" type="text" placeholder="Buscar por cliente ou OS..." id="searchInput" oninput="filtrarOS()" />
    <button type="button" class="btn-nova-os" onclick="novaOS()">+ Nova Ordem de Serviço</button>
    <div class="os-list" id="osList"></div>
  </aside>

  <!-- MAIN -->
  <main>

    <!-- IDENTIFICAÇÃO DA OS -->
    <div class="card">
      <div class="card-header"><div class="dot"></div><h2>Identificação da OS</h2></div>
      <div class="card-body">
        <div class="row">
          <div class="field">
            <label>Nome da OS</label>
            <input type="text" id="nomeOS" placeholder="Ex: OS-2024-001" />
          </div>
          <div class="field">
            <label>Número do Chamado</label>
            <input type="text" id="numeroChamado" placeholder="Ex: CHM-00123" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Revenda</label>
            <input type="text" id="revenda" placeholder="Nome da revenda" />
          </div>
        </div>
      </div>
    </div>

    <!-- DADOS DO CLIENTE -->
    <div class="card">
      <div class="card-header"><div class="dot"></div><h2>Dados do Cliente</h2></div>
      <div class="card-body">
        <div class="row">
          <div class="field">
            <label>Nome</label>
            <input type="text" id="clienteNome" placeholder="Nome completo" />
          </div>
          <div class="field">
            <label>CPF / CNPJ</label>
            <input type="text" id="clienteCpf" placeholder="000.000.000-00" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Endereço</label>
            <input type="text" id="clienteEndereco" placeholder="Rua, número, cidade, estado" />
          </div>
        </div>
      </div>
    </div>

    <!-- INFORMAÇÕES DA MÁQUINA -->
    <div class="card">
      <div class="card-header"><div class="dot"></div><h2>Informações da Máquina</h2></div>
      <div class="card-body">
        <div class="row">
          <div class="field">
            <label>NS Impressora</label>
            <input type="text" id="nsImpressora" placeholder="Nº de série da impressora" />
          </div>
          <div class="field">
            <label>NS AMS</label>
            <input type="text" id="nsAMS" placeholder="Nº de série do AMS" />
          </div>
          <div class="field">
            <label>New NS</label>
            <input type="text" id="newNS" placeholder="Novo Nº de série" />
          </div>
        </div>
        <div class="field" style="margin-bottom:14px">
          <label>Modelo da Máquina</label>
          <div class="modelo-grid" id="modeloGrid">
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">A1 mini</button>
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">A1</button>
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">A2L</button>
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">P1</button>
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">P2</button>
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">X1</button>
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">X2</button>
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">H2</button>
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">AMS</button>
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">AMS 2</button>
            <button type="button" class="btn-modelo" onclick="selecionarModelo(this)">AMS 2 Pro</button>
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Horas de Uso</label>
            <input type="text" id="horasUso" placeholder="Ex: 250h" />
          </div>
        </div>
      </div>
    </div>

    <!-- ITENS RECEBIDOS -->
    <div class="card">
      <div class="card-header"><div class="dot"></div><h2>Itens Recebidos</h2></div>
      <div class="card-body">
        <div class="field" style="margin-bottom:12px">
          <label>Acessórios e Componentes</label>
        </div>
        <div class="checks-row">
          <label class="check-label"><input type="checkbox" id="chkPEI" /> Placa PEI</label>
          <label class="check-label"><input type="checkbox" id="chkCaixa" /> Caixa original</label>
          <label class="check-label"><input type="checkbox" id="chkPTFE" /> Tubos PTFE</label>
          <label class="check-label"><input type="checkbox" id="chkSD" /> Cartão SD</label>
          <label class="check-label"><input type="checkbox" id="chkLimpador" /> Limpador de purga</label>
          <label class="check-label"><input type="checkbox" id="chkAcessorios" /> Acessórios / Ferramentas</label>
          <label class="check-label"><input type="checkbox" id="chkCabo" /> Cabo de energia</label>
          <label class="check-label"><input type="checkbox" id="chkSuporte" /> Suporte de filamento</label>
        </div>
        <hr class="divider" />
        <div class="field" style="margin-bottom:10px">
          <label>Estado de Recebimento</label>
        </div>
        <div class="estado-row" style="margin-bottom:14px">
          <button type="button" class="btn-estado bom" onclick="selecionarEstado(this,'bom')">✔ Bom estado</button>
          <button type="button" class="btn-estado dan" onclick="selecionarEstado(this,'dan')">✖ Danificada</button>
        </div>
        <div class="field">
          <label>Observações de Recebimento</label>
          <textarea id="obsRecebimento" placeholder="Descreva o estado geral, arranhões, danos visíveis, etc."></textarea>
        </div>
      </div>
    </div>

    <!-- DESCRIÇÃO DO CASO -->
    <div class="card">
      <div class="card-header"><div class="dot"></div><h2>Descrição do Caso</h2></div>
      <div class="card-body">
        <div class="field">
          <label>Descrição do Problema / Caso</label>
          <textarea id="descProblema" placeholder="Descreva detalhadamente o problema relatado pelo cliente..." style="min-height:110px"></textarea>
        </div>
      </div>
    </div>

    <!-- SERVIÇO REALIZADO -->
    <div class="card">
      <div class="card-header"><div class="dot"></div><h2>Serviço Realizado (Manutenção)</h2></div>
      <div class="card-body">
        <div class="field" style="margin-bottom:14px">
          <label>Serviço Realizado</label>
          <textarea id="servicoRealizado" placeholder="Descreva os serviços realizados, peças substituídas..." style="min-height:110px"></textarea>
        </div>
        <div class="field">
          <label>Observações de Devolução</label>
          <textarea id="obsDevolucao" placeholder="Observações sobre o estado na devolução..."></textarea>
        </div>
      </div>
    </div>

    <!-- DATAS -->
    <div class="card card-datas">
      <div class="card-header"><div class="dot"></div><h2>Datas & Responsáveis</h2></div>
      <div class="card-body">
        <div class="row">
          <div class="field">
            <label>Data de Recebimento</label>
            <input type="date" id="dataRecebimento" />
          </div>
          <div class="field">
            <label>Técnicos Responsáveis</label>
            <input type="text" id="tecnicos" placeholder="Ex: Ramon / João / Willian" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label>Data de Início</label>
            <input type="date" id="dataInicio" />
          </div>
          <div class="field">
            <label>Data de Finalização</label>
            <input type="date" id="dataFim" />
          </div>
        </div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button type="button" class="btn-limpar" onclick="limparTudo()">Limpar tudo</button>
      <button type="button" class="btn-salvar" onclick="salvarEGerarPDF()">
        <svg viewBox="0 0 24 24"><path d="M12 16l-4-4h3V4h2v8h3l-4 4zm-7 2h14v2H5v-2z"/></svg>
        Salvar e Gerar PDF
      </button>
    </div>

  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span class="check">✓</span> <span id="toastMsg">Salvo com sucesso!</span>
</div>

<script>
  // ── State ──
  let modeloAtual = null;
  let estadoAtual = null;
  let ordens = JSON.parse(localStorage.getItem('ordens3dtouch') || '[]');
  let ordemAtual = null;

  // ── Init ──
  renderizarLista();

  // ── Modelo ──
  function selecionarModelo(btn) {
    document.querySelectorAll('.btn-modelo').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    modeloAtual = btn.textContent.trim();
  }

  // ── Estado ──
  function selecionarEstado(btn, tipo) {
    document.querySelectorAll('.btn-estado').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    estadoAtual = tipo === 'bom' ? 'Bom estado' : 'Danificada';
  }

  // ── Nova OS ──
  function novaOS() {
    ordemAtual = null;
    limparCampos();
  }

  // ── Limpar ──
  function limparTudo() { limparCampos(); }
  function limparCampos() {
    ['nomeOS','numeroChamado','revenda','clienteNome','clienteCpf','clienteEndereco',
     'nsImpressora','nsAMS','newNS','horasUso','obsRecebimento','descProblema',
     'servicoRealizado','obsDevolucao','dataRecebimento','tecnicos','dataInicio','dataFim'
    ].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    document.querySelectorAll('.btn-modelo').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.btn-estado').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false);
    modeloAtual = null; estadoAtual = null;
  }

  // ── Coletar dados ──
  function coletarDados() {
    const checks = ['chkPEI','chkCaixa','chkPTFE','chkSD','chkLimpador','chkAcessorios','chkCabo','chkSuporte'];
    const labels  = ['Placa PEI','Caixa original','Tubos PTFE','Cartão SD','Limpador de purga','Acessórios/Ferramentas','Cabo de energia','Suporte de filamento'];
    const itens = checks.map((id,i) => document.getElementById(id).checked ? labels[i] : null).filter(Boolean);
    return {
      id: ordemAtual || Date.now(),
      nomeOS: v('nomeOS'), numeroChamado: v('numeroChamado'), revenda: v('revenda'),
      clienteNome: v('clienteNome'), clienteCpf: v('clienteCpf'), clienteEndereco: v('clienteEndereco'),
      nsImpressora: v('nsImpressora'), nsAMS: v('nsAMS'), newNS: v('newNS'),
      modelo: modeloAtual, horasUso: v('horasUso'),
      itens, estado: estadoAtual, obsRecebimento: v('obsRecebimento'),
      descProblema: v('descProblema'), servicoRealizado: v('servicoRealizado'),
      obsDevolucao: v('obsDevolucao'), dataRecebimento: v('dataRecebimento'),
      tecnicos: v('tecnicos'), dataInicio: v('dataInicio'), dataFim: v('dataFim'),
      criadoEm: new Date().toISOString()
    };
  }
  function v(id) { return document.getElementById(id)?.value?.trim() || ''; }

  // ── Salvar ──
  function salvarEGerarPDF() {
    const dados = coletarDados();
    if (!dados.nomeOS) { mostrarToast('Informe o Nome da OS antes de salvar.', true); return; }
    const idx = ordens.findIndex(o => o.id === dados.id);
    if (idx >= 0) ordens[idx] = dados; else ordens.unshift(dados);
    localStorage.setItem('ordens3dtouch', JSON.stringify(ordens));
    ordemAtual = dados.id;
    renderizarLista();
    mostrarToast('Salvo com sucesso!');
    setTimeout(() => gerarPDF(dados), 400);
  }

  // ── PDF ──
  function gerarPDF(d) {
    const fmt = function(s) { return s || '—'; };
    const fmtData = function(s) { return s ? s.split('-').reverse().join('/') : '—'; };
    const estadoClass = d.estado === 'Bom estado' ? 'estado-bom' : 'estado-dan';
    const checksHtml = d.itens.length
      ? d.itens.map(function(i) { return '<span>&#10004; ' + i + '</span>'; }).join('')
      : '<span>Nenhum marcado</span>';
    const obsRecHtml = d.obsRecebimento
      ? '<div class="row" style="margin-top:8px"><div class="field"><label>Observações de Recebimento</label><span>' + fmt(d.obsRecebimento) + '</span></div></div>'
      : '';
    const obsDevolHtml = d.obsDevolucao
      ? '<div class="row" style="margin-top:8px"><div class="field"><label>Obs. de Devolução</label><span style="white-space:pre-wrap">' + fmt(d.obsDevolucao) + '</span></div></div>'
      : '';
    const css = [
      '*{box-sizing:border-box;margin:0;padding:0}',

      '.logo-box{width:40px;height:40px;background:#1FA852;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}',
      '.logo-box span{color:#fff;font-weight:900;font-size:17px}',

      '.body{padding:10px 13px}',
      '.row{display:flex;gap:20px;margin-bottom:10px}',
      '.row:last-child{margin-bottom:0}',
      '.field{flex:1}',
      '.field label{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#1FA852;display:block;margin-bottom:3px}',
      '.field span{font-size:13px;color:#111}',
      /* checks */
      '.checks{display:flex;flex-wrap:wrap;gap:5px 10px}',
      '.checks span{font-size:12px;background:#e8f5ee;color:#155e36;padding:3px 9px;border-radius:20px;border:1px solid #b6dfc6}',
      /* estado */
      '.estado-badge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}',
      '.estado-bom{background:#dcfce7;color:#16a34a;border:1px solid #86efac}',
      '.estado-dan{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}',

      '.datas-bar .row .field label{color:rgba(255,255,255,.75);font-size:10px}',
      '.datas-bar .row .field span{color:#fff;font-weight:700;font-size:14px}',

      '@media print{body{padding:14px;background:#fff}.logo-bar,.section,.datas-bar{box-shadow:none}button{display:none}}'
    ].join('');
    const html = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/>'
      + '<title>OS – ' + fmt(d.nomeOS) + '</title>'
      + '<style>' + css + '</style></head><body>'

      +   '<div class="logo-box"><span>BL</span></div>'
      +   '<div class="logo-title"><h1>Ordem de Serviço</h1><p>Manutenção e Garantia &middot; BambuLab</p></div>'
      +   '<div style="margin-left:auto;text-align:right">'
      +     '<div style="font-size:18px;font-weight:900">' + fmt(d.nomeOS) + '</div>'
      +     '<div style="font-size:11px;color:#888">Chamado: ' + fmt(d.numeroChamado) + '</div>'
      +   '</div>'
      + '</div>'

      +   '<div class="field"><label>Nome da OS</label><span>' + fmt(d.nomeOS) + '</span></div>'
      +   '<div class="field"><label>Número do Chamado</label><span>' + fmt(d.numeroChamado) + '</span></div>'
      +   '<div class="field"><label>Revenda</label><span>' + fmt(d.revenda) + '</span></div>'
      + '</div></div></div>'
      + '<div class="section sec-cli"><h2>Dados do Cliente</h2><div class="body">'
      +   '<div class="row">'

      +     '<div class="field"><label>CPF / CNPJ</label><span>' + fmt(d.clienteCpf) + '</span></div>'
      +   '</div>'
      +   '<div class="row"><div class="field"><label>Endereço</label><span>' + fmt(d.clienteEndereco) + '</span></div></div>'
      + '</div></div>'
      + '<div class="section sec-maq"><h2>Informações da Máquina</h2><div class="body">'
      +   '<div class="row">'
      +     '<div class="field"><label>NS Impressora</label><span>' + fmt(d.nsImpressora) + '</span></div>'
      +     '<div class="field"><label>NS AMS</label><span>' + fmt(d.nsAMS) + '</span></div>'

    const win = window.open('', '_blank');

  // ── Renderizar lista ──
  function renderizarLista(filtro='') {
    const lista = document.getElementById('osList');
    const filtradas = ordens.filter(o =>
      (!filtro) ||
      (o.clienteNome||'').toLowerCase().includes(filtro) ||
      (o.nomeOS||'').toLowerCase().includes(filtro)
    );
    lista.innerHTML = filtradas.length
      ? filtradas.map(o => `
          <div class="os-item" onclick="carregarOS(${o.id})">
            <div class="os-item-name">${o.nomeOS || 'Sem nome'}</div>
            <div class="os-item-sub">${o.clienteNome || 'Cliente não informado'}</div>
          </div>`).join('')
      : '<div style="font-size:12px;color:#aaa;text-align:center;padding:12px 0">Nenhuma OS encontrada</div>';
  }

  // ── Filtrar ──
  function filtrarOS() {
    renderizarLista(document.getElementById('searchInput').value.toLowerCase());
  }

  // ── Carregar OS ──
  function carregarOS(id) {
    const d = ordens.find(o => o.id === id);
    if (!d) return;
    ordemAtual = d.id;
    const set = (elId, val) => { const el = document.getElementById(elId); if(el) el.value = val||''; };
    set('nomeOS', d.nomeOS); set('numeroChamado', d.numeroChamado); set('revenda', d.revenda);
    set('clienteNome', d.clienteNome); set('clienteCpf', d.clienteCpf); set('clienteEndereco', d.clienteEndereco);
    set('nsImpressora', d.nsImpressora); set('nsAMS', d.nsAMS); set('newNS', d.newNS);
    set('horasUso', d.horasUso); set('obsRecebimento', d.obsRecebimento);
    set('descProblema', d.descProblema); set('servicoRealizado', d.servicoRealizado);
    set('obsDevolucao', d.obsDevolucao); set('dataRecebimento', d.dataRecebimento);
    set('tecnicos', d.tecnicos); set('dataInicio', d.dataInicio); set('dataFim', d.dataFim);
    // modelo
    document.querySelectorAll('.btn-modelo').forEach(b => {
      b.classList.toggle('active', b.textContent.trim() === d.modelo);
    });
    modeloAtual = d.modelo;
    // estado
    document.querySelectorAll('.btn-estado').forEach(b => b.classList.remove('active'));
    if (d.estado === 'Bom estado') document.querySelector('.btn-estado.bom')?.classList.add('active');
    if (d.estado === 'Danificada') document.querySelector('.btn-estado.dan')?.classList.add('active');
    estadoAtual = d.estado;
    // checkboxes
    const chkMap = {
      chkPEI:'Placa PEI', chkCaixa:'Caixa original', chkPTFE:'Tubos PTFE', chkSD:'Cartão SD',
      chkLimpador:'Limpador de purga', chkAcessorios:'Acessórios/Ferramentas',
      chkCabo:'Cabo de energia', chkSuporte:'Suporte de filamento'
    };
    Object.entries(chkMap).forEach(([id, label]) => {
      document.getElementById(id).checked = (d.itens||[]).includes(label);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Toast ──
  function mostrarToast(msg, erro=false) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.querySelector('.check').textContent = erro ? '✖' : '✓';
    t.querySelector('.check').style.color = erro ? '#1FA852' : '#22c55e';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
